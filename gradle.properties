org.gradle.caching=true
org.gradle.parallel=true
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8

# IPC contract version this runtime was built against. Used to:
#   - resolve the upstream jar names in build.gradle.kts
#   - compose the URL when downloading from BossConsole release assets
# Match this to BossConsole's IpcVersion.CURRENT for the BossConsole release
# you intend to consume. On a host with a different IPC version the runtime
# will fail to spawn (Phase 0 compat gate) — that's the safety net.
ipc.version=1.0.0

# Runtime release version (bumped per release by CI).
runtime.version=1.0.0
